      top: 28px;

    }
  }

  <body>
  <div id="root"></div>

  <script>
  const menuButton = document.createElement("button");
  menuButton.className = "mobile-menu-button";
  menuButton.innerHTML = "☰";
  menuButton.setAttribute("aria-label", "Open menu");

  document.body.appendChild(menuButton);

  menuButton.addEventListener("click", function () {
    document.body.classList.toggle("mobile-menu-open");
    menuButton.innerHTML = document.body.classList.contains("mobile-menu-open") ? "×" : "☰";
  });

  document.addEventListener("click", function (event) {
    const text = event.target.textContent.trim().toUpperCase();

    const links = {
      "HOME": "./",
      "ABOUT": "./about.html",
      "LINEAGE": "./lineage.html",
      "GOVERNANCE": "./governance.html",
      "DOCTRINE": "./doctrine.html",
      "FELLOWSHIP": "./fellowship.html",
      "AMAZON LAB": "./amazon-lab.html"
    };

    if (links[text]) {
      event.preventDefault();
      window.location.href = links[text];
    }
  }, true);
</script>
